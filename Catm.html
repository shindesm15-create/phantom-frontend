<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Phantom </title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    height:100vh;
    overflow:hidden;

    background:
    radial-gradient(circle at top left,#31104d,#070707 45%),
    radial-gradient(circle at bottom right,#4b0d74,#000000 45%);

    color:white;
}

/* =========================
   MAIN CONTAINER
========================= */

.container{
    display:flex;
    height:100vh;
}

/* =========================
   SIDEBAR
========================= */

.sidebar{
    width:320px;
    background:rgba(15,15,25,0.85);

    border-right:1px solid rgba(255,255,255,0.05);

    backdrop-filter:blur(25px);

    overflow-y:auto;

    position:relative;
}

/* GLOW */

.sidebar::before{
    content:"";

    position:absolute;

    width:260px;
    height:260px;

    background:#a855f7;

    filter:blur(130px);

    opacity:0.14;

    top:-120px;
    left:-120px;
}

/* =========================
   LOGO
========================= */

.logo{
    padding:24px;

    font-size:30px;

    font-weight:700;

    letter-spacing:2px;

    border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo span{
    color:#d8b4fe;

    text-shadow:
    0 0 18px rgba(168,85,247,0.55);
}

/* =========================
   USER INFO
========================= */

.me{
    padding:16px 24px;

    color:#bdbdbd;

    font-size:14px;

    border-bottom:1px solid rgba(255,255,255,0.05);
}

/* =========================
   USERS
========================= */

#users{
    padding:12px;
}

.user{
    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:16px;

    margin-bottom:10px;

    border-radius:18px;

    cursor:pointer;

    transition:0.3s;

    background:rgba(255,255,255,0.03);

    border:1px solid transparent;

    font-size:15px;

    font-weight:500;
}

.user:hover{

    transform:translateY(-2px);

    background:#1b1527;

    border:1px solid rgba(216,180,254,0.20);

    box-shadow:
    0 0 18px rgba(168,85,247,0.12);
}

/* =========================
   CHAT AREA
========================= */

.chat{
    flex:1;

    display:flex;

    flex-direction:column;

    background:
    rgba(8,8,12,0.92);

    position:relative;
}

/* =========================
   TOP BAR
========================= */

.top{
    height:75px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 25px;

    border-bottom:1px solid rgba(255,255,255,0.05);

    background:
    rgba(15,15,25,0.72);

    backdrop-filter:blur(20px);
}

.topLeft{
    display:flex;

    align-items:center;

    gap:14px;
}

/* AVATAR */

.avatar{
    width:48px;
    height:48px;

    border-radius:50%;

    background:
    linear-gradient(
        135deg,
        #a855f7,
        #7c3aed
    );

    display:flex;

    justify-content:center;

    align-items:center;

    font-weight:600;

    font-size:18px;

    box-shadow:
    0 0 18px rgba(168,85,247,0.22);
}

/* CHAT INFO */

.chatInfo h2{
    font-size:18px;
    font-weight:600;
}

.chatInfo p{
    font-size:12px;
    color:#c084fc;
}

/* BACK BUTTON */

.backBtn{
    color:#d8b4fe;

    cursor:pointer;

    font-size:14px;

    font-weight:600;
}

/* =========================
   TYPING
========================= */

#typing{
    padding:10px 24px 0;

    font-size:13px;

    color:#9f9f9f;

    min-height:22px;
}

/* =========================
   MESSAGES
========================= */

.messages{
    flex:1;

    overflow-y:auto;

    padding:22px;

    display:flex;

    flex-direction:column;

    gap:12px;
}

/* SCROLLBAR */

.messages::-webkit-scrollbar{
    width:6px;
}

.messages::-webkit-scrollbar-thumb{
    background:#a855f7;
    border-radius:10px;
}

/* =========================
   MESSAGE BUBBLES
========================= */

.myMsg,
.otherMsg{

    max-width:72%;

    padding:14px 16px;

    border-radius:22px;

    animation:pop 0.2s ease;

    word-wrap:break-word;

    position:relative;
}

/* MY MESSAGE */

.myMsg{

    align-self:flex-end;

    background:
    linear-gradient(
        135deg,
        #a855f7,
        #7c3aed
    );

    color:white;

    border-bottom-right-radius:6px;

    box-shadow:
    0 0 18px rgba(168,85,247,0.16);
}

/* OTHER MESSAGE */

.otherMsg{

    align-self:flex-start;

    background:#191522;

    border:1px solid rgba(255,255,255,0.05);

    border-bottom-left-radius:6px;
}

/* TIME */

.msgTime{

    font-size:11px;

    margin-top:6px;

    opacity:0.75;

    text-align:right;
}

/* POP ANIMATION */

@keyframes pop{

    from{
        transform:scale(0.8);
        opacity:0;
    }

    to{
        transform:scale(1);
        opacity:1;
    }
}

/* =========================
   INPUT AREA
========================= */

.bottom{

    display:flex;

    gap:12px;

    padding:18px;

    border-top:1px solid rgba(255,255,255,0.05);

    background:
    rgba(12,12,20,0.82);

    backdrop-filter:blur(20px);
}

/* INPUT */

.bottom input{

    flex:1;

    padding:16px;

    border:none;

    outline:none;

    border-radius:18px;

    background:#1d1727;

    color:white;

    font-size:15px;

    border:1px solid rgba(255,255,255,0.05);

    transition:0.3s;
}

.bottom input:focus{

    border:1px solid rgba(216,180,254,0.35);

    box-shadow:
    0 0 16px rgba(168,85,247,0.12);
}

/* BUTTON */

.bottom button{

    width:60px;

    border:none;

    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        #a855f7,
        #7c3aed
    );

    color:white;

    font-size:20px;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 0 18px rgba(168,85,247,0.18);
}

.bottom button:hover{

    transform:scale(1.05);
}

/* =========================
   MOBILE
========================= */

@media(max-width:700px){

    .sidebar{
        width:100%;
    }

    .chat{
        display:none;
    }

    .chat.active{
        display:flex;

        position:fixed;

        width:100%;
        height:100%;

        top:0;
        left:0;

        z-index:100;
    }

    .myMsg,
    .otherMsg{
        max-width:85%;
    }
}

</style>

</head>

<body>

<div class="container">

    <!-- ======================
         SIDEBAR
    ======================= -->

    <div class="sidebar">

        <div class="logo">
            👻 <span>Dark Chats</span>
        </div>

        <!-- IMPORTANT FOR BACKEND -->
        <div class="me" id="me"></div>

        <!-- IMPORTANT FOR BACKEND -->
        <div id="users"></div>

    </div>

    <!-- ======================
         CHAT
    ======================= -->

    <div class="chat">

        <!-- TOP -->

        <div class="top">

            <div class="topLeft">

                <div class="avatar" id="avatarBox">
                    👻
                </div>

                <div class="chatInfo">

                    <!-- IMPORTANT FOR BACKEND -->
                    <h2 id="chatWith">
                        Select User
                    </h2>

                    <p>
                        Phantom Secure Chat
                    </p>

                </div>

            </div>

            <div class="backBtn" onclick="closeChat()">
                Back
            </div>

        </div>

        <!-- IMPORTANT FOR BACKEND -->
        <div id="typing"></div>

        <!-- IMPORTANT FOR BACKEND -->
        <div class="messages" id="messages"></div>

        <!-- INPUT -->

        <div class="bottom">

            <!-- IMPORTANT FOR BACKEND -->
            <input
                type="text"
                id="msg"
                placeholder="Type message..."
                autocomplete="off"
            >

            <button onclick="send()">
                ➤
            </button>

        </div>

    </div>

</div>

<!-- ======================
     SOCKET LIBRARIES
====================== -->

<script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

<!-- ======================
     YOUR BACKEND JS
====================== -->

<script src="script.js?v=2"></script>

</body>

</html>
