!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>Phantom </title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet"
/>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100dvh;
    overflow:hidden;
}

/* =========================
   BODY
========================= */

body{

    font-family:'Poppins',sans-serif;

    background:
    radial-gradient(circle at top left,#31104d,#070707 45%),
    radial-gradient(circle at bottom right,#4b0d74,#000000 45%);

    color:white;
}

/* =========================
   APP
========================= */

.container{
    width:100%;
    height:100dvh;
    display:flex;
    overflow:hidden;
}

/* =========================
   SIDEBAR
========================= */

.sidebar{

    width:320px;

    background:
    rgba(15,15,25,0.88);

    backdrop-filter:blur(25px);

    border-right:
    1px solid rgba(255,255,255,0.05);

    overflow-y:auto;

    flex-shrink:0;
}

/* LOGO */

.logo{

    padding:22px;

    font-size:28px;

    font-weight:700;

    border-bottom:
    1px solid rgba(255,255,255,0.05);
}

.logo span{
    color:#d8b4fe;
}

/* ME */

.me{

    padding:16px 22px;

    font-size:14px;

    color:#aaa;

    border-bottom:
    1px solid rgba(255,255,255,0.05);
}

/* USERS */

#users{
    padding:10px;
}

/* USER */

.user{

    padding:14px;

    border-radius:18px;

    margin-bottom:10px;

    background:
    rgba(255,255,255,0.03);

    cursor:pointer;

    transition:0.25s;
}

.user:hover{

    background:#1d1527;

    transform:translateY(-2px);
}

/* USER ROW */

.userRow{

    display:flex;

    align-items:center;

    gap:12px;
}

/* AVATAR */

.snapAvatar{

    width:48px;
    height:48px;

    border-radius:50%;

    background:
    linear-gradient(
        135deg,
        #a855f7,
        #7c3aed
    );

    display:flex;

    align-items:center;

    justify-content:center;

    font-weight:600;

    font-size:18px;

    flex-shrink:0;
}

/* NAME */

.userName{
    font-size:15px;
    font-weight:500;
}

/* STATUS */

.userStatus{
    font-size:12px;
    margin-top:2px;
}

/* =========================
   CHAT
========================= */

.chat{

    flex:1;

    display:flex;

    flex-direction:column;

    height:100dvh;

    background:
    rgba(8,8,12,0.92);
}

/* =========================
   TOP BAR
========================= */

.top{

    height:75px;

    min-height:75px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:0 20px;

    border-bottom:
    1px solid rgba(255,255,255,0.05);

    background:
    rgba(15,15,25,0.75);

    backdrop-filter:blur(20px);

    flex-shrink:0;
}

/* TOP LEFT */

.topLeft{

    display:flex;

    align-items:center;

    gap:14px;
}

/* CHAT AVATAR */

.avatar{

    width:48px;
    height:48px;

    border-radius:50%;

    background:
    linear-gradient(
        135deg,
        #a855f7,
        #7c3aed
    );

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:20px;

    font-weight:600;
}

/* CHAT INFO */

.chatInfo h2{
    font-size:17px;
}

#chatStatus{
    font-size:12px;
    color:#aaa;
}

/* BACK */

.backBtn{

    display:none;

    color:#d8b4fe;

    cursor:pointer;

    font-size:14px;

    font-weight:600;
}

/* =========================
   TYPING
========================= */

#typing{

    padding:8px 18px 0;

    min-height:22px;

    font-size:12px;

    color:#aaa;

    flex-shrink:0;
}

/* =========================
   MESSAGES
========================= */

.messages{

    flex:1;

    overflow-y:auto;

    padding:18px;

    display:flex;

    flex-direction:column;

    gap:12px;

    scroll-behavior:smooth;

    -webkit-overflow-scrolling:touch;
}

/* SCROLL */

.messages::-webkit-scrollbar{
    width:5px;
}

.messages::-webkit-scrollbar-thumb{
    background:#7c3aed;
    border-radius:10px;
}

/* =========================
   MESSAGE
========================= */

.myMsg,
.otherMsg{

    max-width:75%;

    padding:14px 16px;

    border-radius:22px;

    word-wrap:break-word;

    animation:pop 0.2s ease;
}

/* MY */

.myMsg{

    align-self:flex-end;

    background:
    linear-gradient(
        135deg,
        #a855f7,
        #7c3aed
    );

    border-bottom-right-radius:8px;
}

/* OTHER */

.otherMsg{

    align-self:flex-start;

    background:#1b1527;

    border-bottom-left-radius:8px;
}

/* TIME */

.msgTime{

    margin-top:6px;

    font-size:11px;

    opacity:0.7;

    text-align:right;
}

/* ANIMATION */

@keyframes pop{

    from{
        transform:scale(0.8);
        opacity:0;
    }

    to{
        transform:scale(1);
        opacity:1;
    }
}

/* =========================
   INPUT
========================= */

.bottom{

    padding:14px;

    display:flex;

    gap:10px;

    border-top:
    1px solid rgba(255,255,255,0.05);

    background:
    rgba(12,12,20,0.85);

    backdrop-filter:blur(20px);

    flex-shrink:0;
}

/* INPUT */

.bottom input{

    flex:1;

    height:52px;

    border:none;

    outline:none;

    border-radius:18px;

    padding:0 18px;

    background:#1d1727;

    color:white;

    font-size:15px;
}

/* BUTTON */

.bottom button{

    width:56px;

    border:none;

    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        #a855f7,
        #7c3aed
    );

    color:white;

    cursor:pointer;

    font-size:20px;

    flex-shrink:0;
}

/* =========================
   MOBILE
========================= */

@media(max-width:700px){

    .sidebar{

        width:100%;

        height:100dvh;

        display:block;
    }

    .chat{

        display:none;

        position:fixed;

        top:0;
        left:0;

        width:100%;
        height:100dvh;

        z-index:999;
    }

    .chat.active{
        display:flex;
    }

    .backBtn{
        display:block;
    }

    .myMsg,
    .otherMsg{
        max-width:85%;
    }

    .bottom{
        padding-bottom:calc(12px + env(safe-area-inset-bottom));
    }
}

/* DESKTOP */

@media(min-width:701px){

    .chat{
        display:flex !important;
    }

    .sidebar{
        display:block !important;
    }
}

#actionBar{

    position:fixed;

    display:none;

    background:#14111d;

    border:1px solid rgba(255,255,255,.08);

    border-radius:18px;

    overflow:hidden;

    z-index:99999;

    min-width:220px;

    backdrop-filter:blur(20px);

    box-shadow:
    0 10px 30px rgba(0,0,0,.45);
}

.emojiRow{

    display:flex;

    justify-content:space-around;

    padding:12px;
}

.emojiRow span{

    font-size:24px;

    cursor:pointer;

    transition:.2s;
}

.emojiRow span:hover{

    transform:scale(1.25);
}

.actionBtn{

    padding:14px 16px;

    cursor:pointer;

    border-top:1px solid rgba(255,255,255,.05);
}

.actionBtn:hover{

    background:#241834;
}

#replyBox{

    display:none;

    margin:10px;

    padding:10px;

    background:#1d1727;

    border-left:4px solid #a855f7;

    border-radius:10px;
}

.replyTop{

    display:flex;

    justify-content:space-between;

    font-size:12px;

    color:#bba7d9;

    margin-bottom:5px;
}

.replyTop span{

    cursor:pointer;
}

#replyText{

    font-size:14px;

    color:white;
}

.reaction{

    margin-top:6px;

    font-size:20px;
}

</style>

</head>

<body>

<div class="container">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo">
            💀 <span>Dark Chats</span>
        </div>

        <div
        class="me"
        id="me">
            Loading...
        </div>

        <div id="users"></div>

    </div>

    <!-- CHAT -->

    <div class="chat">

        <!-- TOP -->

        <div class="top">

            <div class="topLeft">

                <div
                class="avatar"
                id="avatarBox">
                    💀
                </div>

                <div class="chatInfo">

                    <h2 id="chatWith">
                        Select User
                    </h2>

                    <div id="chatStatus">
                        offline
                    </div>

                </div>

            </div>

            <div
            class="backBtn"
            onclick="closeChat()">
                Back
            </div>

        </div>

        <!-- TYPING -->

        <div id="typing"></div>

        <!-- MESSAGES -->

        <div
        class="messages"
        id="messages"></div>

        <!-- INPUT -->
<div id="replyBox">

    <div class="replyTop">

        Replying to

        <span onclick="cancelReply()">✕</span>

    </div>

    <div id="replyText"></div>

</div>

<div class="bottom">

    <input
        type="text"
        id="msg"
        placeholder="Type message..."
    >

    <button onclick="send()">➤</button>

</div>

    </div>

</div>

<div id="actionBar">

    <div class="emojiRow">

        <span onclick="reactMessage('❤️')">❤️</span>
        <span onclick="reactMessage('👍')">👍</span>
        <span onclick="reactMessage('😂')">😂</span>
        <span onclick="reactMessage('🔥')">🔥</span>

    </div>

    <div class="actionBtn" onclick="replyMessage()">
        ↩️ Reply
    </div>

    <div class="actionBtn" onclick="saveMessage()">
        ⭐ Save
    </div>

    <div class="actionBtn" onclick="deleteMessage()">
        🗑️ Delete
    </div>

</div>


</div>

<script src="script.js"></script>

</body>
</html>
